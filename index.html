<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BebidaOS — Gestão de Adega</title>
<style>
/* ═══════════════════════════════════════
   TOKENS — cor, tipografia, espaçamento
═══════════════════════════════════════ */
:root {
  --bg:       #0d0f14;
  --bg2:      #161920;
  --bg3:      #1e2130;
  --border:   #2a2d3e;
  --accent:   #c8973a;
  --accent2:  #e8b84b;
  --text:     #e8eaf0;
  --text2:    #9095a8;
  --red:      #e05252;
  --green:    #4caf7d;
  --blue:     #5b8dee;
  --radius:   10px;
  --sidebar:  220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; font-size: 13px; }
input, select, textarea { font-family: inherit; font-size: 13px; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ═══════════════════════════════════════
   TELA DE LOGIN
═══════════════════════════════════════ */
#tela-login {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 50%, #1a1200 0%, var(--bg) 60%);
}
.login-box {
  width: 380px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px 36px;
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo h1 { font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.login-logo p { color: var(--text2); font-size: 12px; margin-top: 4px; }
.tab-btns { display: flex; background: var(--bg3); border-radius: 8px; padding: 3px; margin-bottom: 24px; }
.tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text2); border-radius: 6px; transition: all .2s; font-size: 13px; }
.tab-btn.on { background: var(--accent); color: #000; font-weight: 600; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.form-group input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); outline: none; transition: border-color .2s; }
.form-group input:focus { border-color: var(--accent); }
.btn-primary { width: 100%; padding: 11px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-weight: 700; font-size: 14px; margin-top: 6px; transition: opacity .2s; }
.btn-primary:hover { opacity: .88; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.msg-erro { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; min-height: 16px; }

/* ═══════════════════════════════════════
   LAYOUT PRINCIPAL
═══════════════════════════════════════ */
#app { display: none; height: 100vh; overflow: hidden; }
#app.visivel { display: flex; }

/* Sidebar */
.sidebar {
  width: var(--sidebar); min-width: var(--sidebar);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.sidebar-logo { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
.sidebar-logo h2 { font-size: 18px; font-weight: 700; color: var(--accent); }
.sidebar-logo span { font-size: 11px; color: var(--text2); }
.sidebar-empresa { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.sidebar-empresa p { font-size: 11px; color: var(--text2); }
.sidebar-empresa strong { display: block; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
nav { padding: 10px 8px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px;
  color: var(--text2); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s; margin-bottom: 2px;
  border: none; background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.ativo { background: rgba(200,151,58,.15); color: var(--accent); }
.nav-item .ni { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border); }

/* Trial banner na sidebar */
.trial-banner {
  margin: 8px 8px 4px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 11px; line-height: 1.4;
}
.trial-banner.verde { background: rgba(76,175,125,.1); border: 1px solid rgba(76,175,125,.3); color: var(--green); }
.trial-banner.amarelo { background: rgba(232,184,75,.1); border: 1px solid rgba(232,184,75,.3); color: var(--accent2); }
.trial-banner.vermelho { background: rgba(224,82,82,.1); border: 1px solid rgba(224,82,82,.3); color: var(--red); }
.trial-banner strong { display: block; }
.trial-banner a { text-decoration: underline; cursor: pointer; font-weight: 600; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; min-height: 56px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
}
.topbar h3 { font-size: 16px; font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ═══════════════════════════════════════
   COMPONENTES REUTILIZÁVEIS
═══════════════════════════════════════ */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.kpi-label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.kpi-val { font-size: 26px; font-weight: 700; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
.kpi.accent .kpi-val { color: var(--accent); }
.kpi.green .kpi-val { color: var(--green); }
.kpi.red .kpi-val { color: var(--red); }

/* Tabelas */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 12px; text-align: left; font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,.02); }
tr:last-child td { border-bottom: none; }

/* Botões */
.btn { padding: 7px 14px; border-radius: 7px; border: none; font-size: 13px; font-weight: 500; transition: opacity .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-verde { background: var(--green); color: #fff; }
.btn-acento { background: var(--accent); color: #000; font-weight: 600; }
.btn-azul { background: var(--blue); color: #fff; }
.btn-vermelho { background: var(--red); color: #fff; }
.btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(76,175,125,.15); color: var(--green); }
.badge-red { background: rgba(224,82,82,.15); color: var(--red); }
.badge-yellow { background: rgba(232,184,75,.15); color: var(--accent2); }
.badge-blue { background: rgba(91,141,238,.15); color: var(--blue); }
.badge-gray { background: var(--bg3); color: var(--text2); }

/* Toolbar de pesquisa + botão */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.input-busca { padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; min-width: 220px; }
.input-busca:focus { border-color: var(--accent); }
select.sel { padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
select.sel:focus { border-color: var(--accent); }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 1000;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.aberto { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h4 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { color: var(--text); background: var(--bg3); }
.modal-body { padding: 22px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--border); }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.frow.full { grid-template-columns: 1fr; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg label { font-size: 12px; color: var(--text2); font-weight: 500; }
.fg input, .fg select, .fg textarea { padding: 9px 11px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
.fg textarea { resize: vertical; min-height: 70px; }

/* ═══════════════════════════════════════
   PDV
═══════════════════════════════════════ */
.pdv-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; height: calc(100vh - 56px - 48px); }
.pdv-produtos { display: flex; flex-direction: column; gap: 12px; }
.pdv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; }
.pdv-prod {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 10px; cursor: pointer; text-align: center;
  transition: border-color .15s, background .15s;
}
.pdv-prod:hover { border-color: var(--accent); background: var(--bg3); }
.pdv-prod .em { font-size: 28px; margin-bottom: 6px; }
.pdv-prod .pn { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.pdv-prod .pp { font-size: 13px; font-weight: 700; color: var(--accent); }
.pdv-prod .pe { font-size: 10px; color: var(--text2); }
.pdv-cart { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
.pdv-cart-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
.pdv-cart-items { flex: 1; overflow-y: auto; padding: 8px; }
.cart-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px; }
.cart-item .ci-nome { flex: 1; font-size: 12px; line-height: 1.3; }
.cart-item .ci-qtd { display: flex; align-items: center; gap: 4px; }
.ci-qtd button { background: var(--border); border: none; color: var(--text); width: 22px; height: 22px; border-radius: 5px; font-size: 14px; }
.ci-qtd span { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item .ci-total { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 60px; text-align: right; }
.cart-item .ci-rm { background: none; border: none; color: var(--text2); font-size: 16px; }
.cart-item .ci-rm:hover { color: var(--red); }
.pdv-cart-footer { padding: 14px 16px; border-top: 1px solid var(--border); }
.cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; color: var(--text2); }
.cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
.cart-total span:last-child { color: var(--accent); }
.fp-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.fp-btn { padding: 7px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; text-align: center; }
.fp-btn.sel { border-color: var(--accent); background: rgba(200,151,58,.1); color: var(--accent); font-weight: 600; }
.cart-vazio { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px; color: var(--text2); gap: 8px; font-size: 13px; }

/* ═══════════════════════════════════════
   TELA DE BLOQUEIO (assinatura expirada)
═══════════════════════════════════════ */
#tela-bloqueio {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
  z-index: 9999; align-items: center; justify-content: center;
}
#tela-bloqueio.visivel { display: flex; }
.bloqueio-box { background: var(--bg2); border: 1px solid var(--red); border-radius: 16px; padding: 40px; text-align: center; max-width: 420px; }
.bloqueio-box h2 { color: var(--red); font-size: 22px; margin-bottom: 10px; }
.bloqueio-box p { color: var(--text2); margin-bottom: 20px; line-height: 1.6; }

/* ═══════════════════════════════════════
   ESTOQUE BADGE ALERTA
═══════════════════════════════════════ */
.est-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 2px; }
.est-bar-fill { height: 100%; border-radius: 2px; }
.est-bar-fill.normal { background: var(--green); }
.est-bar-fill.baixo { background: var(--accent2); }
.est-bar-fill.critico { background: var(--red); }

/* ═══════════════════════════════════════
   PEDIDOS KANBAN
═══════════════════════════════════════ */
.kanban { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.kanban-col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.kanban-header { padding: 10px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
.kanban-items { padding: 10px; min-height: 80px; display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--bg3); border-radius: 8px; padding: 10px 12px; font-size: 12px; }
.kanban-card .kc-id { color: var(--text2); margin-bottom: 4px; }
.kanban-card .kc-cliente { font-weight: 600; margin-bottom: 2px; }
.kanban-card .kc-total { color: var(--accent); font-weight: 600; }

/* Utilitários */
.mt10 { margin-top: 10px; }
.mt16 { margin-top: 16px; }
.mt20 { margin-top: 20px; }
.flex-row { display: flex; gap: 10px; align-items: center; }
.spacer { flex: 1; }
.empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
.loading { text-align: center; padding: 30px; color: var(--text2); }
</style>
</head>
<body>

<!-- ════════ TELA DE LOGIN ════════ -->
<div id="tela-login">
  <div class="login-box">
    <div class="login-logo">
      <h1>🍷 BebidaOS</h1>
      <p>Gestão completa para adega e loja de bebidas</p>
    </div>
    <div class="tab-btns">
      <button class="tab-btn on" id="tab-login" onclick="alternarTab('login')">Entrar</button>
      <button class="tab-btn" id="tab-reg" onclick="alternarTab('registro')">Cadastrar</button>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="li-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="li-senha" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
      <p class="msg-erro" id="li-erro"></p>
    </div>

    <!-- Registro -->
    <div id="form-registro" style="display:none">
      <div class="form-group">
        <label>Nome da Adega / Loja</label>
        <input type="text" id="rg-empresa" placeholder="Adega do João">
      </div>
      <div class="form-group">
        <label>Seu nome</label>
        <input type="text" id="rg-nome" placeholder="João Silva">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="rg-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha (mín. 6 caracteres)</label>
        <input type="password" id="rg-senha" placeholder="••••••">
      </div>
      <button class="btn-primary" id="btn-reg" onclick="fazerRegistro()">Criar conta grátis</button>
      <p class="msg-erro" id="rg-erro"></p>
    </div>
  </div>
</div>

<!-- ════════ TELA DE BLOQUEIO ════════ -->
<div id="tela-bloqueio">
  <div class="bloqueio-box">
    <h2>⚠️ Assinatura Expirada</h2>
    <p>Seu período de acesso ao BebidaOS expirou.<br>Renove sua assinatura por R$59,99/mês para continuar usando.</p>
    <button class="btn btn-acento" style="width:100%;padding:12px;font-size:15px" onclick="irParaAssinatura()">Renovar Assinatura</button>
    <br><br>
    <button class="btn btn-ghost btn-sm" onclick="fazerLogout()">Sair</button>
  </div>
</div>

<!-- ════════ APP PRINCIPAL ════════ -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>🍷 BebidaOS</h2>
      <span>Gestão de Bebidas</span>
    </div>
    <div class="sidebar-empresa">
      <p>Logado como</p>
      <strong id="sb-empresa">—</strong>
    </div>
    <div id="trial-banner-container"></div>
    <nav>
      <button class="nav-item ativo" onclick="irPara('dashboard')"><span class="ni">📊</span> Dashboard</button>
      <button class="nav-item" onclick="irPara('pdv')"><span class="ni">💳</span> PDV / Caixa</button>
      <button class="nav-item" onclick="irPara('estoque')"><span class="ni">📦</span> Estoque</button>
      <button class="nav-item" onclick="irPara('clientes')"><span class="ni">👥</span> Clientes</button>
      <button class="nav-item" onclick="irPara('vendas')"><span class="ni">🧾</span> Vendas</button>
      <button class="nav-item" onclick="irPara('pedidos')"><span class="ni">🛵</span> Delivery</button>
      <button class="nav-item" onclick="irPara('financeiro')"><span class="ni">💰</span> Financeiro</button>
      <button class="nav-item" onclick="irPara('fornecedores')"><span class="ni">🏭</span> Fornecedores</button>
      <button class="nav-item" onclick="irPara('vendedores')"><span class="ni">🤝</span> Vendedores</button>
      <button class="nav-item" onclick="irPara('relatorios')"><span class="ni">📈</span> Relatórios</button>
      <button class="nav-item" onclick="irPara('configuracoes')"><span class="ni">⚙️</span> Configurações</button>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="fazerLogout()">Sair</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <div class="topbar">
      <h3 id="topbar-titulo">Dashboard</h3>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Modal genérico -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h4 id="modal-titulo">Modal</h4>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════════
const API = 'https://adegaos-production.up.railway.app';

// ═══════════════════════════════════════════════════════════
// ESTADO GLOBAL — apenas metadados de sessão, NUNCA dados de negócio
// ═══════════════════════════════════════════════════════════
let SESSAO = { token: null, usuario: null, empresa: null };
let MODULO_ATUAL = 'dashboard';

// PDV: único estado local aceito (carrinho temporário)
let PDV = { itens: [], forma_pagamento: 'dinheiro', cliente_id: null, vendedor_id: null };

// ═══════════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const fmt = (v, dec=2) => Number(v||0).toLocaleString('pt-BR', { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtBRL = v => 'R$ ' + fmt(v);
const fmtData = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—';
const fmtHora = d => d ? new Date(d).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '—';
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Requisição autenticada à API
async function api(metodo, rota, corpo) {
  const opts = {
    method: metodo,
    headers: {
      'Content-Type': 'application/json',
      ...(SESSAO.token ? { 'Authorization': 'Bearer ' + SESSAO.token } : {})
    }
  };
  if (corpo !== undefined) opts.body = JSON.stringify(corpo);

  const res = await fetch(API + rota, opts);
  const data = await res.json().catch(() => ({}));

  if (res.status === 401) { fazerLogout(); return null; }
  if (res.status === 403 && data.codigo === 'ASSINATURA_EXPIRADA') {
    mostrarBloqueio();
    return null;
  }
  if (!res.ok) {
    throw new Error(data.erro || 'Erro desconhecido');
  }
  return data;
}

function toast(msg, tipo = 'ok') {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '20px', right: '20px', zIndex: '9998',
    padding: '10px 16px', borderRadius: '8px', fontSize: '13px', fontWeight: '500',
    background: tipo === 'ok' ? '#4caf7d' : tipo === 'err' ? '#e05252' : '#5b8dee',
    color: '#fff', boxShadow: '0 4px 12px rgba(0,0,0,.4)',
    transform: 'translateY(10px)', opacity: '0', transition: 'all .25s'
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.transform = 'translateY(0)'; t.style.opacity = '1'; });
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateY(10px)';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

function alternarTab(aba) {
  $('form-login').style.display    = aba === 'login'    ? '' : 'none';
  $('form-registro').style.display = aba === 'registro' ? '' : 'none';
  $('tab-login').className = 'tab-btn' + (aba === 'login' ? ' on' : '');
  $('tab-reg').className   = 'tab-btn' + (aba === 'registro' ? ' on' : '');
}

async function fazerLogin() {
  const email = $('li-email').value.trim();
  const senha = $('li-senha').value;
  $('li-erro').textContent = '';
  if (!email || !senha) { $('li-erro').textContent = 'Preencha e-mail e senha'; return; }

  $('btn-login').disabled = true;
  $('btn-login').textContent = 'Entrando…';
  try {
    const dados = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const res = await dados.json();
    if (!dados.ok) throw new Error(res.erro || 'Erro no login');
    iniciarSessao(res);
  } catch (e) {
    $('li-erro').textContent = e.message;
  } finally {
    $('btn-login').disabled = false;
    $('btn-login').textContent = 'Entrar';
  }
}

async function fazerRegistro() {
  const nome_empresa   = $('rg-empresa').value.trim();
  const nome_responsavel = $('rg-nome').value.trim();
  const email          = $('rg-email').value.trim();
  const senha          = $('rg-senha').value;
  $('rg-erro').textContent = '';

  if (!nome_empresa || !email || !senha) { $('rg-erro').textContent = 'Preencha todos os campos'; return; }
  if (senha.length < 6) { $('rg-erro').textContent = 'Senha deve ter ao menos 6 caracteres'; return; }

  $('btn-reg').disabled = true;
  $('btn-reg').textContent = 'Criando conta…';
  try {
    const dados = await fetch(API + '/api/auth/registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome_empresa, nome_responsavel, email, senha })
    });
    const res = await dados.json();
    if (!dados.ok) throw new Error(res.erro || 'Erro no cadastro');
    iniciarSessao(res);
  } catch (e) {
    $('rg-erro').textContent = e.message;
  } finally {
    $('btn-reg').disabled = false;
    $('btn-reg').textContent = 'Criar conta grátis';
  }
}

function iniciarSessao(dados) {
  SESSAO = { token: dados.token, usuario: dados.usuario, empresa: dados.empresa };
  localStorage.setItem('bebidaos_token', dados.token);
  localStorage.setItem('bebidaos_usuario', JSON.stringify(dados.usuario));
  localStorage.setItem('bebidaos_empresa', JSON.stringify(dados.empresa));
  mostrarApp();
}

function fazerLogout() {
  SESSAO = { token: null, usuario: null, empresa: null };
  localStorage.removeItem('bebidaos_token');
  localStorage.removeItem('bebidaos_usuario');
  localStorage.removeItem('bebidaos_empresa');
  $('app').classList.remove('visivel');
  $('tela-login').style.display = 'flex';
  $('tela-bloqueio').classList.remove('visivel');
}

function mostrarBloqueio() {
  $('tela-bloqueio').classList.add('visivel');
}

function irParaAssinatura() {
  $('tela-bloqueio').classList.remove('visivel');
  irPara('configuracoes');
}

function tentarRestaurarSessao() {
  const token   = localStorage.getItem('bebidaos_token');
  const usuario = localStorage.getItem('bebidaos_usuario');
  const empresa = localStorage.getItem('bebidaos_empresa');
  if (token && usuario && empresa) {
    SESSAO = { token, usuario: JSON.parse(usuario), empresa: JSON.parse(empresa) };
    mostrarApp();
  }
}

function mostrarApp() {
  $('tela-login').style.display = 'none';
  $('app').classList.add('visivel');
  $('sb-empresa').textContent = SESSAO.empresa?.nome || '—';
  renderizarTrialBanner();
  irPara('dashboard');
}

function renderizarTrialBanner() {
  const empresa = SESSAO.empresa;
  if (!empresa) return;
  const agora = new Date();
  const container = $('trial-banner-container');

  if (empresa.plano_ativo) {
    container.innerHTML = '';
    return;
  }

  if (!empresa.trial_expira_em) return;
  const expira = new Date(empresa.trial_expira_em);
  const dias = Math.ceil((expira - agora) / (1000 * 60 * 60 * 24));

  if (dias > 7) {
    container.innerHTML = `<div class="trial-banner verde"><strong>✅ Trial ativo</strong>${dias} dias restantes. <a onclick="irPara('configuracoes')">Assinar</a></div>`;
  } else if (dias > 0) {
    container.innerHTML = `<div class="trial-banner amarelo"><strong>⚠️ Trial expira em ${dias}d</strong><a onclick="irPara('configuracoes')">Assinar agora</a></div>`;
  } else {
    container.innerHTML = `<div class="trial-banner vermelho"><strong>🔴 Trial expirado</strong><a onclick="irParaAssinatura()">Renovar</a></div>`;
  }
}

  if (!MODULOS[modulo]) return;
  MODULO_ATUAL = modulo;

  // Atualiza nav ativo
  document.querySelectorAll('.nav-item').forEach((btn, i) => {
    const keys = Object.keys(MODULOS);
    btn.classList.toggle('ativo', keys[i] === modulo);
  });

  $('topbar-titulo').textContent = MODULOS[modulo].titulo;
  $('topbar-actions').innerHTML = '';
  $('content').innerHTML = '<div class="loading">Carregando…</div>';
  MODULOS[modulo].render();
}

function filtrarProdutosPDV() {
  const busca = $('pdv-busca').value.toLowerCase();
  const grid = $('pdv-grid');
  if (!window._pdvProdutos) return;

  const filtrados = window._pdvProdutos.filter(p =>
    p.nome.toLowerCase().includes(busca) ||
    (p.codigo_barras && p.codigo_barras.includes(busca))
  );

  grid.innerHTML = filtrados.map(p => `
    <div class="pdv-prod" onclick="adicionarAoCarrinho('${p.id}','${esc(p.nome)}',${p.preco_venda},'${esc(p.icone||'🍷')}',${p.estoque_atual})">
      <div class="em">${p.icone||'🍷'}</div>
      <div class="pn">${esc(p.nome)}</div>
      <div class="pp">${fmtBRL(p.preco_venda)}</div>
      <div class="pe">Estoque: ${fmt(p.estoque_atual,0)}</div>
    </div>
  `).join('') || '<div class="empty">Nenhum produto encontrado</div>';
}

function adicionarAoCarrinho(id, nome, preco, icone, estoqueDisp) {
  const existe = PDV.itens.find(i => i.produto_id === id);
  if (existe) {
    if (existe.quantidade >= estoqueDisp) { toast('Estoque insuficiente', 'err'); return; }
    existe.quantidade++;
  } else {
    PDV.itens.push({ produto_id: id, nome, preco_unitario: preco, quantidade: 1, desconto: 0, icone, estoqueDisp });
  }
  renderizarCarrinho();
}

function alterarQtd(id, delta) {
  const item = PDV.itens.find(i => i.produto_id === id);
  if (!item) return;
  const nova = item.quantidade + delta;
  if (nova <= 0) {
    PDV.itens = PDV.itens.filter(i => i.produto_id !== id);
  } else if (nova > item.estoqueDisp) {
    toast('Estoque insuficiente', 'err');
    return;
  } else {
    item.quantidade = nova;
  }
  renderizarCarrinho();
}

function removerItem(id) {
  PDV.itens = PDV.itens.filter(i => i.produto_id !== id);
  renderizarCarrinho();
}

function selecionarForma(forma) {
  PDV.forma_pagamento = forma;
  document.querySelectorAll('.fp-btn').forEach(b => b.classList.remove('sel'));
  const btn = document.getElementById('fp-' + forma);
  if (btn) btn.classList.add('sel');
}

function renderizarCarrinho() {
  const el = $('pdv-cart-items');
  if (!el) return;

  if (PDV.itens.length === 0) {
    el.innerHTML = '<div class="cart-vazio">🛒<span>Toque em um produto para adicionar</span></div>';
    $('pdv-subtotal').textContent = 'R$ 0,00';
    $('pdv-total').textContent = 'R$ 0,00';
    return;
  }

  let total = 0;
  el.innerHTML = PDV.itens.map(item => {
    const sub = item.preco_unitario * item.quantidade;
    total += sub;
    return `
      <div class="cart-item">
        <span>${item.icone}</span>
        <div class="ci-nome">${esc(item.nome)}<br><small style="color:var(--text2)">${fmtBRL(item.preco_unitario)}/un</small></div>
        <div class="ci-qtd">
          <button onclick="alterarQtd('${item.produto_id}',-1)">−</button>
          <span>${item.quantidade}</span>
          <button onclick="alterarQtd('${item.produto_id}',1)">+</button>
        </div>
        <div class="ci-total">${fmtBRL(sub)}</div>
        <button class="ci-rm" onclick="removerItem('${item.produto_id}')">×</button>
      </div>
    `;
  }).join('');

  $('pdv-subtotal').textContent = fmtBRL(total);
  $('pdv-total').textContent = fmtBRL(total);
}

async function finalizarVenda() {
  if (PDV.itens.length === 0) { toast('Adicione produtos ao carrinho', 'err'); return; }

  const payload = {
    cliente_id:      PDV.cliente_id || null,
    vendedor_id:     PDV.vendedor_id || null,
    itens:           PDV.itens.map(i => ({
                       produto_id: i.produto_id,
                       quantidade: i.quantidade,
                       preco_unitario: i.preco_unitario,
                       desconto: 0
                     })),
    forma_pagamento: PDV.forma_pagamento,
    desconto_total:  0
  };

  try {
    const res = await api('POST', '/api/vendas', payload);
    if (!res) return;
    toast('Venda finalizada! Total: ' + fmtBRL(res.total));
    PDV = { itens: [], forma_pagamento: 'dinheiro', cliente_id: null, vendedor_id: null };
    renderPDV();
  } catch (e) {
    toast('Erro: ' + e.message, 'err');
  }
}

function renderLinhasProdutos(lista) {
  if (!lista || lista.length === 0) return '<tr><td colspan="8" class="empty">Nenhum produto cadastrado</td></tr>';
  return lista.map(p => {
    const pct = p.estoque_minimo > 0 ? Math.min(100, (p.estoque_atual / p.estoque_minimo) * 100) : 100;
    const cls = p.estoque_atual <= 0 ? 'critico' : p.estoque_atual <= p.estoque_minimo ? 'baixo' : 'normal';
    const badge = p.estoque_atual <= 0 ? 'badge-red' : p.estoque_atual <= p.estoque_minimo ? 'badge-yellow' : 'badge-green';
    const label = p.estoque_atual <= 0 ? 'Zerado' : p.estoque_atual <= p.estoque_minimo ? 'Baixo' : 'Normal';
    return `
      <tr>
        <td><span style="font-size:18px;margin-right:6px">${p.icone||'🍷'}</span>${esc(p.nome)}</td>
        <td>${esc(p.categorias?.nome||'—')}</td>
        <td>
          ${fmt(p.estoque_atual,0)} ${p.unidade||'un'}
          <div class="est-bar"><div class="est-bar-fill ${cls}" style="width:${pct}%"></div></div>
        </td>
        <td>${fmt(p.estoque_minimo,0)}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td>${fmtBRL(p.preco_custo)}</td>

async function renderPedidos() {

  try {

    ];

      <div class="kanban">

              <div class="kanban-items">
                ${itens.map(p=>`

                      ${proximosStatus(p.status).map(s=>`
                        <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 7px" onclick="atualizarStatusPedido('${p.id}','${s.valor}')">${s.label}</button>
                      `).join('')}

      </div>
    `;
  } catch (e) {
    $('content').innerHTML = `<div class="empty">Erro: ${esc(e.message)}</div>`;
  }

function proximosStatus(atual) {
  const fluxo = {
    pendente:     [{ valor:'confirmado', label:'Confirmar' }, { valor:'cancelado', label:'Cancelar' }],
    confirmado:   [{ valor:'em_preparo', label:'Preparar' }],
    em_preparo:   [{ valor:'saiu_entrega', label:'Saiu p/ entrega' }],
    saiu_entrega: [{ valor:'entregue', label:'Entregue' }],
    entregue:     [],
    cancelado:    []
  };
  return fluxo[atual] || [];
}

  ]);

  abrirModal('Novo Pedido (Delivery)', `

      <select id="pd-cliente">
        <option value="">Sem cadastro</option>
        ${(clientes?.clientes||[]).map(c=>`<option value="${c.id}">${esc(c.nome)} — ${esc(c.telefone||'')}</option>`).join('')}
      </select>
    </div>

    <div class="frow mt10">
      <div class="fg"><label>Forma Pagamento</label>
        <select id="pd-forma">
          <option value="dinheiro">Dinheiro</option>
          <option value="pix">PIX</option>
          <option value="cartao_debito">Débito</option>
          <option value="cartao_credito">Crédito</option>
        </select>
      </div>
      <div class="fg"><label>Taxa de Entrega (R$)</label><input type="number" id="pd-taxa" value="0" min="0" step="0.01"></div>
    </div>
    <div class="fg mt10"><label>Produto</label>
      <select id="pd-prod-sel">
        <option value="">Selecione para adicionar…</option>
        ${(produtos||[]).map(p=>`<option value="${p.id}" data-preco="${p.preco_venda}">${esc(p.icone||'🍷')} ${esc(p.nome)} — ${fmtBRL(p.preco_venda)}</option>`).join('')}
      </select>
    </div>
    <div id="pd-itens" style="margin-top:10px"></div>
    <div class="fg mt10"><label>Observações</label><textarea id="pd-obs" rows="2"></textarea></div>
  `, `
    <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-acento" onclick="salvarNovoPedido()">Criar Pedido</button>
  `);

  window._pdItens = [];
  $('pd-prod-sel').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const id = opt.value;
    const preco = parseFloat(opt.getAttribute('data-preco'));
    const nome = opt.text;
    if (!id) return;
    const existe = window._pdItens.find(i => i.produto_id === id);
    if (existe) { existe.quantidade++; }
    else { window._pdItens.push({ produto_id: id, nome, preco_unitario: preco, quantidade: 1 }); }
    this.value = '';
    renderPdItens();
  });
}

function renderPdItens() {
  $('pd-itens').innerHTML = window._pdItens.map((it,i) => `
    <div class="cart-item">
      <div class="ci-nome">${esc(it.nome)}</div>
      <div class="ci-qtd">
        <button onclick="window._pdItens[${i}].quantidade=Math.max(1,window._pdItens[${i}].quantidade-1);renderPdItens()">−</button>
        <span>${it.quantidade}</span>
        <button onclick="window._pdItens[${i}].quantidade++;renderPdItens()">+</button>
      </div>
      <div class="ci-total">${fmtBRL(it.preco_unitario * it.quantidade)}</div>
      <button class="ci-rm" onclick="window._pdItens.splice(${i},1);renderPdItens()">×</button>
    </div>
  `).join('');
}

async function salvarNovoPedido() {
  if (!window._pdItens || window._pdItens.length === 0) { toast('Adicione ao menos 1 item', 'err'); return; }
  try {
    await api('POST', '/api/pedidos', {
      cliente_id:      $('pd-cliente').value || null,
      endereco_entrega: $('pd-end').value || null,
      forma_pagamento: $('pd-forma').value,

          <input id="nova-cat-nome" class="input-busca" placeholder="Nome da nova categoria" style="flex:1">
          <input id="nova-cat-icone" class="input-busca" placeholder="🍷" style="width:60px;text-align:center">
          <button class="btn btn-acento" onclick="adicionarCategoria()">+ Adicionar</button>
        </div>
      </div>
    `;

    carregarCategorias();
  } catch (e) {
    $('content').innerHTML = `<div class="empty">Erro: ${esc(e.message)}</div>`;
  }
}

async function carregarCategorias() {
  const cats = await api('GET', '/api/categorias');
  if (!$('cats-lista')) return;
  $('cats-lista').innerHTML = (cats||[]).map(c=>
    `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:20px">${c.icone||'📦'}</span>
      <span style="flex:1">${esc(c.nome)}</span>
      <button class="btn btn-ghost btn-sm" onclick="excluirCategoria('${c.id}')">🗑</button>
    </div>`
  ).join('') || '<div class="empty">Nenhuma categoria</div>';
}

async function adicionarCategoria() {
  const nome = $('nova-cat-nome').value.trim();
  const icone = $('nova-cat-icone').value || '📦';
  if (!nome) { toast('Nome é obrigatório', 'err'); return; }
  try {
    await api('POST', '/api/categorias', { nome, icone });
    toast('Categoria adicionada!');
    $('nova-cat-nome').value = '';
    carregarCategorias();
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function excluirCategoria(id) {
  if (!confirm('Excluir esta categoria?')) return;
  try {
    await api('DELETE', '/api/categorias/' + id);
    toast('Categoria removida');
    carregarCategorias();
  } catch (e) {
    toast(e.message, 'err');
  }
}

function modalAlterarSenha() {
  abrirModal('Alterar Senha', `
    <div class="fg"><label>Senha atual</label><input type="password" id="s-atual"></div>
    <div class="fg mt10"><label>Nova senha (mín. 6 caracteres)</label><input type="password" id="s-nova"></div>
    <div class="fg mt10"><label>Confirmar nova senha</label><input type="password" id="s-conf"></div>
  `, `
    <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
    <button class="btn btn-acento" onclick="salvarNovaSenha()">Alterar</button>
  `);
}

async function salvarNovaSenha() {
  const atual = $('s-atual').value;
  const nova = $('s-nova').value;
  const conf = $('s-conf').value;
  if (!atual || !nova) { toast('Preencha todos os campos', 'err'); return; }
  if (nova !== conf) { toast('Senhas não coincidem', 'err'); return; }
  if (nova.length < 6) { toast('Nova senha deve ter ao menos 6 caracteres', 'err'); return; }
  try {
    await api('PUT', '/api/auth/senha', { senha_atual: atual, senha_nova: nova });
    toast('Senha alterada com sucesso!');
    fecharModal();
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function abrirCheckout() {
  try {
    const res = await api('POST', '/api/pagamentos/checkout');
    if (!res || !res.url) { toast('Erro ao abrir checkout', 'err'); return; }
    window.open(res.url, '_blank');
  } catch (e) {
    toast(e.message, 'err');
  }
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVis = $('tela-login').style.display !== 'none';
  if (!loginVis) return;
  const abaAtiva = $('form-login').style.display !== 'none' ? 'login' : 'registro';
  if (abaAtiva === 'login') fazerLogin();
  else fazerRegistro();
});
